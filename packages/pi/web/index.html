<!doctype html>
<html lang="en" class="h-full bg-[#0d1117]">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>diff review</title>
    <style>
      __INLINE_CSS__
    </style>
  </head>
  <body class="h-full overflow-hidden bg-review-bg text-review-text antialiased">
    <div id="root-layout" class="flex h-full w-full flex-col">
      <div
        class="flex items-center justify-between gap-4 border-b border-review-border bg-[#010409] px-4 py-3"
      >
        <div class="min-w-0 flex items-center gap-3">
          <button
            id="toggle-sidebar-button"
            class="cursor-pointer rounded-md border border-review-border bg-review-panel px-3 py-1.5 text-xs font-medium text-review-text hover:bg-[#21262d]"
          >
            Hide sidebar
          </button>
          <div class="min-w-0">
            <div id="window-title" class="text-[15px] font-semibold text-white">Review</div>
            <div id="repo-root" class="truncate text-[11px] text-review-muted"></div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <div id="summary" class="max-w-[24rem] truncate text-[11px] text-review-muted"></div>
          <button
            id="overall-comment-button"
            class="cursor-pointer rounded-md border border-review-border bg-review-panel px-3 py-1.5 text-xs font-medium text-review-text hover:bg-[#21262d]"
          >
            Overall note
          </button>
          <button
            id="cancel-button"
            class="cursor-pointer rounded-md border border-review-border bg-review-panel px-3 py-1.5 text-xs font-medium text-review-text hover:bg-red-500/10 hover:text-red-400 hover:border-red-500/30"
          >
            Cancel
          </button>
          <button
            id="submit-button"
            class="cursor-pointer rounded-md border border-[rgba(240,246,252,0.1)] bg-[#238636] px-3 py-1.5 text-xs font-medium text-white hover:bg-[#2ea043] disabled:cursor-default disabled:opacity-50 disabled:hover:bg-[#238636]"
          >
            Finish review
          </button>
        </div>
      </div>

      <div id="content-layout" class="flex min-h-0 flex-1">
        <aside
          id="sidebar"
          class="flex min-h-0 shrink-0 flex-col border-r border-review-border bg-[#0d1117]"
          style="width: 280px; min-width: 280px; flex-basis: 280px; overflow: hidden"
        >
          <div class="border-b border-review-border px-4 py-3">
            <div class="mb-2 flex items-center justify-between gap-2">
              <div
                id="sidebar-title"
                class="text-[11px] font-semibold uppercase tracking-wider text-review-muted"
              >
                Files
              </div>
              <div class="text-[10px] text-review-muted">Fuzzy filter</div>
            </div>
            <div class="mb-3 flex flex-wrap items-center gap-2">
              <button
                id="scope-diff-button"
                class="cursor-pointer rounded-md border border-review-border bg-review-panel px-2.5 py-1 text-[11px] font-medium text-review-text hover:bg-[#21262d]"
              >
                Git diff
              </button>
              <button
                id="scope-last-commit-button"
                class="cursor-pointer rounded-md border border-review-border bg-review-panel px-2.5 py-1 text-[11px] font-medium text-review-text hover:bg-[#21262d]"
              >
                Last commit
              </button>
              <button
                id="scope-all-button"
                class="cursor-pointer rounded-md border border-review-border bg-review-panel px-2.5 py-1 text-[11px] font-medium text-review-text hover:bg-[#21262d]"
              >
                All files
              </button>
            </div>
            <input
              id="sidebar-search-input"
              type="text"
              spellcheck="false"
              autocomplete="off"
              placeholder="Search files"
              class="w-full rounded-md border border-review-border bg-review-panel px-3 py-2 text-sm text-review-text outline-none placeholder:text-review-muted focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
            />
          </div>
          <div id="file-tree" class="scrollbar-thin min-h-0 flex-1 overflow-auto px-2 pb-2"></div>
        </aside>

        <main id="main-pane" class="flex min-h-0 min-w-0 flex-1 flex-col bg-[#0d1117]">
          <div
            class="flex items-center justify-between gap-4 border-b border-review-border bg-[#0d1117] px-4 py-2"
          >
            <div class="min-w-0">
              <div id="current-file-label" class="truncate text-sm font-semibold text-white"></div>
              <div id="mode-hint" class="mt-0.5 text-[11px] text-review-muted"></div>
            </div>
            <div class="flex items-center gap-3">
              <button
                id="toggle-reviewed-button"
                class="cursor-pointer rounded-md border border-review-border bg-review-panel px-3 py-1 text-xs font-medium text-review-text hover:bg-[#21262d]"
              >
                Mark reviewed
              </button>
              <button
                id="toggle-wrap-button"
                class="cursor-pointer rounded-md border border-review-border bg-review-panel px-3 py-1 text-xs font-medium text-review-text hover:bg-[#21262d]"
              >
                Wrap lines: on
              </button>
              <button
                id="toggle-unchanged-button"
                class="cursor-pointer rounded-md border border-review-border bg-review-panel px-3 py-1 text-xs font-medium text-review-text hover:bg-[#21262d]"
              >
                Show changed areas only
              </button>
              <button
                id="file-comment-button"
                class="cursor-pointer rounded-md border border-review-border bg-review-panel px-3 py-1 text-xs font-medium text-review-text hover:bg-[#21262d]"
              >
                Add file comment
              </button>
            </div>
          </div>
          <div
            id="file-comments-container"
            class="hidden border-b border-review-border bg-[#0d1117] px-4 py-0"
          ></div>
          <div id="editor-container" class="min-h-0 min-w-0 flex-1"></div>
        </main>
      </div>
    </div>

    <script id="diff-review-data" type="application/json">
      __INLINE_DATA__
    </script>
    <script src="__APP_JS_SRC__"></script>
  </body>
</html>
